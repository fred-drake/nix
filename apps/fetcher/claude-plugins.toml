[[repos]]
name = "claude-plugins-official-src"
url = "https://github.com/anthropics/claude-plugins-official"
# Use builtins.fetchTarball so this entry stays platform-independent —
# claude-code.nix reads its marketplace.json at eval time, which would
# otherwise require an x86_64-linux builder when evaluating Linux hosts
# from a Darwin workstation.
fetcher = "tarball"

[[repos]]
name = "cc-marketplace-src"
url = "https://github.com/samber/cc"

[[repos]]
name = "cc-skills-golang-src"
url = "https://github.com/samber/cc-skills-golang"

[[repos]]
name = "superpowers-src"
url = "https://github.com/obra/superpowers"

# cmux skills (manaflow-ai/cmux). The repo is not itself a Claude plugin
# (no .claude-plugin/plugin.json), so claude-code.nix synthesizes the
# plugin manifest and points --plugin-dir at the wrapped result.
[[repos]]
name = "cmux-src"
url = "https://github.com/manaflow-ai/cmux"

# Andrej Karpathy behavioral skills (multica-ai/andrej-karpathy-skills,
# formerly forrestchang/andrej-karpathy-skills — repo was transferred).
# Self-contained plugin: .claude-plugin/plugin.json at repo root, source "./".
[[repos]]
name = "karpathy-skills-src"
url = "https://github.com/multica-ai/andrej-karpathy-skills"

# Netresearch AGENTS.md generator skill. Self-contained plugin:
# .claude-plugin/plugin.json at repo root, skill under skills/agent-rules.
[[repos]]
name = "agent-rules-skill-src"
url = "https://github.com/netresearch/agent-rules-skill"

# Anthropic example skills (anthropics/skills). Marketplace of many skills;
# claude-code.nix curates a subset (frontend-design, pdf) into a synthesized
# plugin.
[[repos]]
name = "anthropic-skills-src"
url = "https://github.com/anthropics/skills"

# Vercel agent skills (vercel-labs/agent-skills). No root plugin manifest;
# claude-code.nix curates a subset (web-design-guidelines,
# vercel-react-best-practices, composition-patterns) into a synthesized plugin.
[[repos]]
name = "vercel-agent-skills-src"
url = "https://github.com/vercel-labs/agent-skills"

# Trail of Bits security skills (trailofbits/skills). Marketplace of 39
# self-contained plugins under plugins/<name>, each with its own plugin.json.
[[repos]]
name = "trailofbits-skills-src"
url = "https://github.com/trailofbits/skills"

# Remotion best-practices skill (remotion-dev/skills). No plugin manifest;
# claude-code.nix synthesizes one around skills/remotion.
[[repos]]
name = "remotion-skills-src"
url = "https://github.com/remotion-dev/skills"

# Marketing skills (coreyhaines31/marketingskills). Self-contained plugin:
# .claude-plugin/plugin.json at repo root bundling 43 skills under skills/.
[[repos]]
name = "marketing-skills-src"
url = "https://github.com/coreyhaines31/marketingskills"

# herdr agent skill (ogulcancelik/herdr). Upstream keeps the reusable skill at
# repo-root SKILL.md, so claude-code.nix wraps just that file into a skills/ tree.
[[repos]]
name = "herdr-src"
url = "https://github.com/ogulcancelik/herdr"
