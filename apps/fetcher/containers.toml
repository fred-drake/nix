# Media stack (migrated from the nixarr module to podman containers on
# ironforge). Digests are pinned; tags only move on an explicit
# `just update-containers`. LinuxServer.io images unless noted.
[[containers]]
repository = "ghcr.io"
name = "linuxserver/jellyfin"
# Pinned to 10.11.10. The 10.10.7 -> 10.11 upgrade runs a one-way EF Core
# migration consolidating library.db into jellyfin.db. NOTE: on first boot the
# linuxserver image crash-loops ~4x with `ObjectDisposedException: LoggerFactory`
# at the network-config PreInitialisation migrations — this is a transient,
# data-independent upstream bug; the s6 supervisor restarts and the migration
# self-heals to "Startup complete" within ~60s. It MUST NOT be interrupted. The
# cutover here was done by migrating /config offline first, so the deployed
# container starts clean. Rollback snapshot: /data/.state/nixarr/jellyfin.rollback-10.10.7.
tag = "10.11.10"
architectures = ["linux/amd64"]
