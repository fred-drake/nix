# Media stack (migrated from the nixarr module to podman containers on
# ironforge). Digests are pinned; tags only move on an explicit
# `just update-containers`. LinuxServer.io images unless noted.
[[containers]]
repository = "ghcr.io"
name = "linuxserver/jellyfin"
# Pinned to 10.10.7 (the version nixarr ran) — NOT latest. The `latest` tag is
# now 10.11.x, whose one-way library-db migration consolidated library.db into
# jellyfin.db and left the UI with no libraries on first boot. Stay on the
# running major; upgrade to 10.11 deliberately later with a fresh snapshot.
tag = "10.10.7"
architectures = ["linux/amd64"]
