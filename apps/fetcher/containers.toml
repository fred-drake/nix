# Media stack (migrated from the nixarr module to podman containers on
# ironforge). Digests are pinned; tags only move on an explicit
# `just update-containers`. LinuxServer.io images unless noted.
[[containers]]
repository = "ghcr.io"
name = "linuxserver/jellyfin"
# Tracks `latest` (currently 10.11.x) so `just update-containers` picks up new
# releases. Digests are still pinned in containers-sha.nix — nothing moves until
# you explicitly refresh, so upgrades stay deliberate.
# WARNING for future MAJOR upgrades: the 10.10 -> 10.11 EF Core migration
# (library.db -> jellyfin.db) crash-looped ~4x with
# `ObjectDisposedException: LoggerFactory` at the network-config PreInitialisation
# migrations before self-healing to "Startup complete" via the s6 supervisor.
# That crash loop is transient and MUST NOT be interrupted. For a big migration,
# snapshot /config and consider migrating it offline first so the deployed
# container starts clean (see the 10.11.10 cutover in git history).
tag = "latest"
architectures = ["linux/amd64"]
